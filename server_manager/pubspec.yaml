name: inti_server_manager
description: "Panel de control y servidor multiplataforma para Artesanías Inti."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_static: ^1.1.2
  crypto: ^3.0.3
  uuid: ^4.3.3
  http: ^1.2.1
  dotenv: ^4.2.0
  network_info_plus: ^6.0.0
  path_provider: ^2.1.2
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
